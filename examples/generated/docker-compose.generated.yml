services:

  # ── Backing service: api ──────────────────────────────────────────────────
  #
  # Changes applied by DSO:
  #   ✦ `ports` removed  → host binding moved to dso-proxy-api
  #   ✦ `expose` added   → port 3000 accessible on dso_mesh network only
  #   ✦ `networks`       → joined to dso_mesh bridge
  #   ✦ `labels`         → DSO metadata injected for the control plane
  #
  # The original service, including all env vars, healthcheck, restart policy,
  # and depends_on, is preserved exactly as written.
  api:
    image: node:20-alpine
    working_dir: /app
    command: node server.js
    environment:
      - PORT=3000
      - NODE_ENV=production
    expose:
      - "3000"                     # ← was: ports: ["3000:3000"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dso_mesh                   # ← injected: joins the proxy mesh network
    labels:
      dso.service: api             # ← injected: service identity for the control API
      dso.managed: "true"          # ← injected: marks this as a DSO-managed service
    restart: unless-stopped

  # ── Proxy service: dso-proxy-api ─────────────────────────────────────────
  #
  # This service is fully generated by DSO. Do not add it to your compose file.
  #
  # What it does:
  #   • Owns port 3000 on the Docker host (the host-side TCP listener)
  #   • Routes connections to the current `api` container via dso_mesh
  #   • Uses round-robin load balancing when multiple api replicas exist
  #   • Exposes a dynamic control API on port 9900 (internal only, dso_mesh)
  #     which the DSO agent uses to add/remove backends without restart
  #
  # Configuration is passed via environment variables:
  #   DSO_PROXY_BINDS    — "listenPort:service:targetPort" per port mapping
  #   DSO_PROXY_BACKENDS — initial backend to register at startup
  #   DSO_PROXY_API_PORT — HTTP control plane port (default: 9900)
  dso-proxy-api:
    image: docker-secret-operator/dso-proxy:latest
    ports:
      - "3000:3000"                # ← owns the host-side binding
    expose:
      - "9900"                     # ← control API, dso_mesh only
    environment:
      DSO_PROXY_BINDS: "3000:api:3000"
      DSO_PROXY_BACKENDS: "api-default:api:api:0"
      DSO_PROXY_API_PORT: "9900"
    networks:
      - dso_mesh
    depends_on:
      - api                        # starts after the backing service is up
    labels:
      dso.proxy: "true"
      dso.service: api
      dso.managed: "true"
    restart: unless-stopped

  # ── Pass-through service: worker ─────────────────────────────────────────
  #
  # No ports declared → DSO passes this through completely unchanged.
  worker:
    image: node:20-alpine
    working_dir: /app
    command: node worker.js
    environment:
      - QUEUE_URL=redis://cache:6379
    depends_on:
      - cache

  # ── Pass-through service: cache (redis) ───────────────────────────────────
  #
  # redis is a known database image → DSO skips proxy injection automatically.
  # Ports, volumes, and all other fields are preserved verbatim.
  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"                # ← preserved, not moved to a proxy

networks:
  dso_mesh:
    driver: bridge                 # ← always created: the shared proxy mesh network
