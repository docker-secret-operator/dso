# DSO Example: AWS Secrets Manager (V2)
providers:
  aws-prod:
    type: aws
    region: us-east-2    # Change to your AWS region
    auth:
      method: iam_role

agent:
  cache: true
  watch:
    polling_interval: 5m    

defaults:
  inject:
    type: env
  rotation:
    enabled: true
    strategy: rolling # Default strategy for all secrets

secrets:
  - name: arn:aws:secretsmanager:REGION:ACCOUNT:secret:YOUR_SECRET_NAME
    provider: aws-prod
    rotation:
      strategy: restart # Override global default for this specific secret
    mappings:
      MYSQL_ROOT_PASSWORD: MYSQL_ROOT_PASSWORD
      MYSQL_USER: MYSQL_USER
      MYSQL_PASSWORD: MYSQL_PASSWORD
