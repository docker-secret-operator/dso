version: '3.8'

# Minimal DSO Local Mode Example
# Perfect for getting started quickly

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    labels:
      dso.reloader: "true"
      dso.secrets: "db"
      dso.update.strategy: "rolling"
    environment:
      POSTGRES_USER: dso://app/db_user
      POSTGRES_PASSWORD: dso://app/db_password
      POSTGRES_DB: "myapp"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: python:3.11
    container_name: app
    labels:
      dso.reloader: "true"
      dso.secrets: "app"
      dso.update.strategy: "rolling"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: dso://app/db_user
      DB_PASSWORD: dso://app/db_password
      DB_NAME: "myapp"
      API_KEY: dso://app/api_key
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:

---
# Quick Setup:
#
# 1. Setup DSO
#    docker dso setup --mode local
#    docker dso init
#
# 2. Set secrets
#    docker dso secret set app/db_user "postgres"
#    docker dso secret set app/db_password "mysecretpass"
#    docker dso secret set app/api_key "sk-1234567890"
#
# 3. Deploy
#    docker dso up -d
#
# 4. Verify
#    docker dso doctor
#    docker dso status
