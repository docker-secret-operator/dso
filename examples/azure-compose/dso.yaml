# DSO Example: Azure Key Vault (V3.2)
# Code reference: pkg/config/config.go - ProviderConfig struct
# Provider implementation: cmd/plugins/dso-provider-azure/main.go
providers:
  azure-prod:
    type: azure
    config:
      vault_url: "https://YOUR_VAULT_NAME.vault.azure.net/"
      # tenant_id: ${AZURE_TENANT_ID}  # Optional - for service principal auth
      # client_id: ${AZURE_CLIENT_ID}  # Optional - for service principal auth
      # client_secret: ${AZURE_CLIENT_SECRET}  # Optional - for service principal auth

agent:
  cache: true
  watch:
    polling_interval: 1m

# ── Azure Key Vault note ───────────────────────────────────────────────────────
# Azure secrets are plain strings (not JSON). DSO wraps each value internally
# as {"value": "<secret-string>"}, so the mapping key is always "value".
# ──────────────────────────────────────────────────────────────────────────────

defaults:
  inject:
    type: env

secrets:
  - name: MYSQL-ROOT-PASSWORD    # Exact secret name in Azure Key Vault
    provider: azure-prod
    mappings:
      value: MYSQL_ROOT_PASSWORD

  - name: MYSQL-USER             # Exact secret name in Azure Key Vault
    provider: azure-prod
    mappings:
      value: MYSQL_USER

  - name: MYSQL-PASSWORD         # Exact secret name in Azure Key Vault
    provider: azure-prod
    mappings:
      value: MYSQL_PASSWORD
