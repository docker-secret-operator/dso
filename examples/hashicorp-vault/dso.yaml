# DSO Example: HashiCorp Vault (V3.2)
# Code reference: pkg/config/config.go - ProviderConfig struct
# Note: Vault configuration goes in the 'config' map as it's not a direct field
providers:
  dev-vault:
    type: vault
    config:
      address: http://example.com:8200
      token: ${VAULT_TOKEN}  # Recommended: Use environment variable
      mount: secret

agent:
  cache: true
  watch:
    polling_interval: 20s

defaults:
  inject:
    type: env
  rotation:
    enabled: true
    strategy: restart

secrets:
  - name: mysql
    provider: dev-vault
    mappings:
      # Key in Vault (field) → Environment Variable name in Container
      username: DB_USER
      password: DB_PASS
