# DSO Example: HashiCorp Vault (V3.2)
providers:
  dev-vault:
    type: vault
    address: http://example.com:8200
    token: YOUR_VAULT_TOKEN
    mount: secret

agent:
  cache: true
  watch:
    polling_interval: 20s

defaults:
  inject:
    type: env
  rotation:
    enabled: true
    strategy: restart

secrets:
  - name: mysql
    provider: dev-vault
    mappings:
      # Key in Vault (field) → Environment Variable name in Container
      username: DB_USER
      password: DB_PASS
