# Sample configuration — DO NOT use in production
version: '3.8'

services:
  dso-agent:
    build: .
    container_name: dso-agent
    command: ["dso-agent", "--config", "/test/dso.yaml"]
    restart: unless-stopped
    volumes:
      # Bind mount /var/run to the host so `dso compose up` running on the host
      # can communicate with the /var/run/dso.sock generated by this container.
      - /var/run:/var/run
      # Mount the local cloud credentials folder if using file-based auth (IAAS/PAAS only)
      # - ~/.aws:/root/.aws:ro
      - ./config/dso.yaml:/etc/dso/config.yaml:ro
    # Optional environment variables for Cloud Identity:
    # environment:
    #   - AWS_REGION=us-east-1
    #   - AZURE_TENANT_ID=YOUR_TENANT_ID
    #   - HUAWEI_ACCESS_KEY=YOUR_ACCESS_KEY
    #   - HUAWEI_SECRET_KEY=YOUR_SECRET_KEY
