version: '3.8'

services:
  dso-agent:
    build: .
    container_name: dso-agent
    command: ["dso-agent", "--config", "/test/dso.yaml"]
    restart: unless-stopped
    volumes:
      # Bind mount /var/run to the host so `dso compose up` running on the host
      # can communicate with the /var/run/dso.sock generated by this container.
      - /var/run:/var/run
      # Mount the local AWS credentials folder for seamless CLI authentication testing
      - ~/.aws:/root/.aws:ro
      - ./test_local_secret/dso.yaml:/test/dso.yaml:ro
    # Optional environment variables for Cloud Identity:
    # environment:
    #   - AWS_REGION=us-east-1
    #   - AZURE_TENANT_ID=xxxx
    #   - HUAWEI_ACCESS_KEY=xxxx
    #   - HUAWEI_SECRET_KEY=xxxx
