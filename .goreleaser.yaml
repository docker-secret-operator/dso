version: 2

project_name: dso

before:
  hooks:
    - cmd: go mod tidy
    - cmd: sh
      args: ["-c", "mkdir -p ./dist/plugins"]
    - cmd: sh
      args: ["-c", "CGO_ENABLED=0 go build -o ./dist/plugins/dso-provider-aws ./cmd/plugins/dso-provider-aws"]
    - cmd: sh
      args: ["-c", "CGO_ENABLED=0 go build -o ./dist/plugins/dso-provider-azure ./cmd/plugins/dso-provider-azure"]
    - cmd: sh
      args: ["-c", "CGO_ENABLED=0 go build -o ./dist/plugins/dso-provider-vault ./cmd/plugins/dso-provider-vault"]
    - cmd: sh
      args: ["-c", "CGO_ENABLED=0 go build -o ./dist/plugins/dso-provider-huawei ./cmd/plugins/dso-provider-huawei"]

builds:
  - id: docker-dso
    main: ./cmd/dso
    binary: docker-dso
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: dso
    ids:
      - docker-dso
    files:
      - src: dist/plugins/dso-provider-*
        dst: .
        strip_parent: true
    name_template: "dso-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "dso-{{ .Version }}-checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
