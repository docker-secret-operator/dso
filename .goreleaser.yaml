version: 2
project_name: docker-secret-operator

before:
  hooks:
    - go mod tidy
    - go vet ./...

# ─────────────────────────────────────────────────────────────────────────────
# BUILDS
# ─────────────────────────────────────────────────────────────────────────────
builds:
  # ── Main binary (Docker CLI plugin + standalone CLI) ──────────────────────
  - id: docker-dso
    main: ./cmd/docker-dso
    binary: docker-dso
    env:
      - CGO_ENABLED=0
    ldflags:
      # Inject version into internal/cli package where `var version` lives.
      - -s -w
      - -X github.com/docker-secret-operator/dso/internal/cli.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  # ── Provider plugins (Linux-only: cloud mode is systemd-based, Linux only) ─
  # All four entries are required. GoReleaser fails the build if any entry
  # references a missing ./cmd/plugins/{name} directory — no silent skipping.

  - id: dso-provider-aws
    main: ./cmd/plugins/dso-provider-aws
    binary: dso-provider-aws
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: dso-provider-azure
    main: ./cmd/plugins/dso-provider-azure
    binary: dso-provider-azure
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: dso-provider-vault
    main: ./cmd/plugins/dso-provider-vault
    binary: dso-provider-vault
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: dso-provider-huawei
    main: ./cmd/plugins/dso-provider-huawei
    binary: dso-provider-huawei
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

# ─────────────────────────────────────────────────────────────────────────────
# ARCHIVES
# ─────────────────────────────────────────────────────────────────────────────
archives:
  # ── Main binary archive ───────────────────────────────────────────────────
  # Naming convention: docker-dso_{version}_{os}_{arch}.tar.gz
  # Exactly matches TARBALL_NAME in install.sh:
  #   docker-dso_${DSO_VERSION}_${GOOS}_${GOARCH}.tar.gz
  - id: main-archive
    builds:
      - docker-dso
    format: tar.gz
    name_template: "docker-dso_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - scripts/install.sh

  # ── Plugin bundle archive ─────────────────────────────────────────────────
  # Naming convention: dso-plugins-{os}-{arch}-{version}.tar.gz
  # Exactly matches tarballName in installPlugins() in internal/cli/system.go:
  #   fmt.Sprintf("dso-plugins-%s-%s-%s.tar.gz", goos, goarch, ver)
  #
  # wrap_in_directory: "plugins" produces:
  #   plugins/dso-provider-aws
  #   plugins/dso-provider-azure
  #   plugins/dso-provider-vault
  #   plugins/dso-provider-huawei
  #
  # installPlugins() runs: tar -xzf <tarball> -C /usr/local/lib/dso/plugins --strip-components=1
  # --strip-components=1 strips the leading "plugins/" prefix, resulting in:
  #   /usr/local/lib/dso/plugins/dso-provider-aws
  #   /usr/local/lib/dso/plugins/dso-provider-azure
  #   /usr/local/lib/dso/plugins/dso-provider-vault
  #   /usr/local/lib/dso/plugins/dso-provider-huawei
  # This exactly matches knownPlugins in system.go doctor and setup validation.
  - id: plugin-archive
    builds:
      - dso-provider-aws
      - dso-provider-azure
      - dso-provider-vault
      - dso-provider-huawei
    format: tar.gz
    name_template: "dso-plugins-{{ .Os }}-{{ .Arch }}-{{ .Version }}"
    wrap_in_directory: "plugins"
    # Plugin bundle contains only binaries — no extra docs.
    files:
      - none*

# ─────────────────────────────────────────────────────────────────────────────
# CHECKSUMS
# ─────────────────────────────────────────────────────────────────────────────
checksum:
  # Generates a combined checksums.txt for all artifacts.
  name_template: "checksums.txt"
  algorithm: sha256
  # split: true also emits individual <artifact>.sha256 files.
  # install.sh downloads <artifact>.sha256 directly (not checksums.txt).
  # installPlugins() in system.go also downloads <tarball>.sha256 individually.
  split: true

# ─────────────────────────────────────────────────────────────────────────────
# GITHUB RELEASE
# ─────────────────────────────────────────────────────────────────────────────
release:
  github:
    owner: docker-secret-operator
    name: dso
  # Draft first so maintainers can review before publishing.
  draft: true
  prerelease: auto

# ─────────────────────────────────────────────────────────────────────────────
# CHANGELOG
# ─────────────────────────────────────────────────────────────────────────────
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "✨ New Features"
      regexp: "^feat"
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "🔐 Security"
      regexp: "^security"
      order: 2
    - title: "⚙️ Other"
      order: 999
