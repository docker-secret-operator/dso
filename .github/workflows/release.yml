name: Release

on:
  push:
    tags:
      - "v*"   # Trigger on any tag matching v*, e.g. v3.4.0, v3.4.1-rc1

permissions:
  contents: write       # Required for GoReleaser to create GitHub Releases
  id-token: write       # Required for keyless cosign signing via Sigstore OIDC

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout with full history for changelog generation ────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full history needed for GoReleaser changelog

      # ── 2. Set up Go (matches go.mod requirement) ─────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # Reads Go version from go.mod exactly

      # ── 3. Install cosign (keyless Sigstore signing) ──────────────────────
      # Artifacts are signed with a short-lived certificate tied to this
      # workflow's GitHub OIDC identity. No long-lived signing keys required.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      # ── 4. Cache Go modules ───────────────────────────────────────────────
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # ── 5. Validate build before release ──────────────────────────────────
      - name: Verify build
        run: make build && ls -lh docker-dso

      # ── 6. Clean artifacts before release ──────────────────────────────────
      - name: Clean build artifacts
        run: |
          make clean
          echo "✅ Build artifacts cleaned"

      # ── 7. Run GoReleaser (builds, packages, signs, publishes) ───────────
      # GoReleaser invokes cosign via the `signs` block in .goreleaser.yml.
      # The resulting *.bundle sidecars are uploaded to the GitHub Release
      # alongside the tarballs and checksum file.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"   # Pin to GoReleaser v2 major series
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cosign keyless signing reads GITHUB_TOKEN for OIDC token exchange.
          COSIGN_YES: "true"
